name: Project CI (Full Pipeline)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality, research]

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: data_load
            path: data/load_data.py
          - module: data_quality
            path: src/data_quality.py
          - module: research
            path: src/research.py

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # Додаємо перевірку сюди, щоб не ставити бібліотеки дарма
        if: |
          github.event_name != 'workflow_dispatch' || 
          github.event.inputs.module == 'all' || 
          github.event.inputs.module == matrix.module
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Module
        # Головна перевірка: виконувати скрипт тільки якщо модуль збігається з вибором
        if: |
          github.event_name != 'workflow_dispatch' || 
          github.event.inputs.module == 'all' || 
          github.event.inputs.module == matrix.module
        run: |
          mkdir -p reports/
          python ${{ matrix.path }} > reports/${{ matrix.module }}_run.log 2>&1

      - name: Upload Artifacts
        # Зберігаємо артефакти тільки якщо крок виконання не був пропущений
        if: |
          (github.event_name != 'workflow_dispatch' || 
          github.event.inputs.module == 'all' || 
          github.event.inputs.module == matrix.module) && always()
        with:
          name: execution-report-${{ matrix.module }}
          path: reports/
          retention-days: 5
        uses: actions/upload-artifact@v4
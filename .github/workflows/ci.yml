name: Project CI (GitHub-hosted)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Який модуль запустити?"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality, research]

jobs:
  run-logic:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: data_load
            path: data/load_data.py
          - module: data_quality
            path: src/data_quality.py
          - module: research
            path: src/research.py

    # Перевірка для ручного запуску
    if: |
      github.event_name != 'workflow_dispatch' || 
      github.event.inputs.module == 'all' || 
      github.event.inputs.module == matrix.module

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute script
        run: |
          mkdir -p reports/
          echo "Запуск ${{ matrix.module }}..."
          python ${{ matrix.path }} > reports/${{ matrix.module }}_run.log 2>&1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ matrix.module }}
          path: reports/